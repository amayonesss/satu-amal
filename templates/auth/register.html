<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun</title>
    <meta name="description" content="Daftar sebagai Relawan Yayasan Satu Amal Indonesia">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary:       #1a4fba;
            --primary-dark:  #0e3490;
            --primary-light: #3d72e8;
            --accent:        #f59e0b;
            --surface:       #ffffff;
            --bg:            #f0f4fc;
            --text-main:     #0f172a;
            --text-muted:    #64748b;
            --border:        #e2e8f0;
            --error-bg:      #fff1f2;
            --error-text:    #be123c;
            --error-border:  #fecdd3;
            --success-bg:    #f0fdf4;
            --success-text:  #15803d;
            --success-border:#bbf7d0;
            --radius-sm:     6px;
            --radius-md:     12px;
            --radius-lg:     20px;
            --shadow-card:   0 20px 60px rgba(15, 30, 80, 0.15);
            --transition:    0.25s ease;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            display: flex;
            align-items: stretch;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ─── LEFT PANEL ─────────────────────────────────────────── */
        .panel-left {
            display: none;
            flex: 1;
            background: linear-gradient(145deg, #0e3490 0%, #1a4fba 40%, #2563eb 75%, #3d72e8 100%);
            position: relative;
            overflow: hidden;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 60px 56px;
        }

        @media (min-width: 960px) { .panel-left { display: flex; } }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            animation: float 8s ease-in-out infinite;
        }
        .blob-1 { width: 340px; height: 340px; top: -80px;  left: -80px;  animation-delay: 0s;   }
        .blob-2 { width: 220px; height: 220px; bottom: -60px; right: -60px; animation-delay: 2.5s; }
        .blob-3 { width: 160px; height: 160px; bottom: 30%; left: 10%;    animation-delay: 1.2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50%       { transform: translateY(-20px) scale(1.04); }
        }

        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.12) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .panel-left-content { position: relative; z-index: 1; }

        .brand-logo-left {
            width: 260px;
            height: 260px;
            object-fit: contain;
            filter: drop-shadow(0 16px 40px rgba(0,0,0,0.25));
        }

        /* ─── RIGHT PANEL ─────────────────────────────────────────── */
        .panel-right {
            flex: 0 0 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            overflow-y: auto;
        }

        @media (min-width: 960px) { .panel-right { flex: 0 0 480px; } }

        .login-box {
            width: 100%;
            max-width: 400px;
        }

        .mobile-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 36px;
        }

        @media (min-width: 960px) { .mobile-brand { display: none; } }

        .mobile-brand img { height: 72px; object-fit: contain; margin-bottom: 12px; }
        .mobile-brand span { font-size: 1.15rem; font-weight: 700; color: var(--primary); }

        .login-heading { margin-bottom: 8px; }
        .login-heading h2 {
            font-size: 1.65rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.4px;
        }
        .login-heading p { margin-top: 6px; font-size: 0.9rem; color: var(--text-muted); }

        .divider {
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 99px;
            margin: 16px 0 28px;
        }

        /* alerts */
        .alert {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 0.875rem;
            line-height: 1.5;
            border: 1px solid;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .alert-danger  { background: var(--error-bg);   color: var(--error-text);   border-color: var(--error-border);   }
        .alert-success { background: var(--success-bg); color: var(--success-text); border-color: var(--success-border); }
        .alert-info    { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; }

        /* form */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 7px;
        }

        .field-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            color: #94a3b8;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .field-wrap input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.93rem;
            font-family: inherit;
            color: var(--text-main);
            background: var(--surface);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .field-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 79, 186, 0.1);
        }

        .field-wrap input::placeholder { color: #b0bec5; }

        .btn-toggle-pw {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.9rem;
            padding: 4px;
            transition: color var(--transition);
        }
        .btn-toggle-pw:hover { color: var(--primary); }

        /* submit button */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            transition: transform var(--transition), box-shadow var(--transition);
            position: relative;
            overflow: hidden;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 79, 186, 0.35);
        }
        .btn-submit:active { transform: translateY(0); }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* footer */
        .login-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.7;
        }
        .badge-year {
            display: inline-block;
            margin-top: 4px;
            font-size: 0.72rem;
            color: #94a3b8;
        }

        /* password strength */
        .strength-bar {
            height: 4px;
            border-radius: 99px;
            background: #e2e8f0;
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.3s ease, background 0.3s ease;
            width: 0%;
        }
        .strength-text {
            font-size: 0.72rem;
            margin-top: 4px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="panel-left">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="panel-left-content">
        <img src="{{ url_for('static', filename='img/logo.png') }}"
             alt="Logo Satu Amal Indonesia"
             class="brand-logo-left"
             onerror="this.style.display='none'">
    </div>
</div>

<!-- RIGHT PANEL -->
<main class="panel-right">
    <div class="login-box">

        <!-- Mobile logo -->
        <div class="mobile-brand">
            <img src="{{ url_for('static', filename='img/logo.png') }}"
                 alt="Logo Satu Amal"
                 onerror="this.style.display='none'">
        </div>

        <div class="login-heading">
            <h2>Daftar Akun</h2>
            <p>Buat akun relawan Anda</p>
        </div>
        <div class="divider"></div>

        {% with msgs = get_flashed_messages(with_categories=true) %}
            {% for cat, msg in msgs %}
            <div class="alert alert-{{ cat }}">
                <i class="fas {% if cat == 'danger' %}fa-circle-exclamation{% elif cat == 'success' %}fa-circle-check{% else %}fa-circle-info{% endif %}"></i>
                <span>{{ msg }}</span>
            </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" id="registerForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <!-- Nama Lengkap -->
            <div class="form-group">
                <label class="form-label" for="nama">Nama Lengkap</label>
                <div class="field-wrap">
                    <input type="text"
                           id="nama"
                           name="nama"
                           placeholder="Masukkan nama lengkap Anda"
                           autocomplete="name"
                           required>
                    <i class="fas fa-user field-icon"></i>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <div class="field-wrap">
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="Masukkan email Anda"
                           autocomplete="email"
                           required>
                    <i class="fas fa-envelope field-icon"></i>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="field-wrap">
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Minimal 6 karakter"
                           autocomplete="new-password"
                           required
                           oninput="checkStrength(this.value)">
                    <i class="fas fa-lock field-icon"></i>
                    <button type="button" class="btn-toggle-pw" id="togglePw1" aria-label="Tampilkan password">
                        <i class="fas fa-eye" id="eyeIcon1"></i>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <div class="strength-text" id="strengthText"></div>
            </div>

            <!-- Konfirmasi Password -->
            <div class="form-group">
                <label class="form-label" for="konfirmasi_password">Konfirmasi Password</label>
                <div class="field-wrap">
                    <input type="password"
                           id="konfirmasi_password"
                           name="konfirmasi_password"
                           placeholder="Ulangi password Anda"
                           autocomplete="new-password"
                           required>
                    <i class="fas fa-lock field-icon"></i>
                    <button type="button" class="btn-toggle-pw" id="togglePw2" aria-label="Tampilkan konfirmasi password">
                        <i class="fas fa-eye" id="eyeIcon2"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnRegister">
                <i class="fas fa-user-plus"></i>
                Buat Akun
            </button>

            <div style="display:flex; justify-content:center; margin-top:16px; font-size:0.85rem;">
                <a href="{{ url_for('auth.login') }}"
                   style="color:#1a4fba; text-decoration:none; font-weight:500;">
                    <i class="fas fa-arrow-left"></i> Sudah punya akun? Masuk
                </a>
            </div>
        </form>

        <footer class="login-footer">
            <p>Sistem Digitalisasi <strong>Daily Activities Report</strong></p>
            <span class="badge-year">© 2026 Yayasan Satu Amal Indonesia. All rights reserved.</span>
        </footer>

    </div>
</main>

<script>
    // Toggle password #1
    document.getElementById('togglePw1').addEventListener('click', () => {
        const inp = document.getElementById('password');
        const ico = document.getElementById('eyeIcon1');
        const hidden = inp.type === 'password';
        inp.type = hidden ? 'text' : 'password';
        ico.className = hidden ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    // Toggle password #2
    document.getElementById('togglePw2').addEventListener('click', () => {
        const inp = document.getElementById('konfirmasi_password');
        const ico = document.getElementById('eyeIcon2');
        const hidden = inp.type === 'password';
        inp.type = hidden ? 'text' : 'password';
        ico.className = hidden ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    // Password strength indicator
    function checkStrength(val) {
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        let score = 0;
        if (val.length >= 6)  score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
            { pct: '20%', color: '#ef4444', label: 'Sangat lemah' },
            { pct: '40%', color: '#f97316', label: 'Lemah' },
            { pct: '60%', color: '#eab308', label: 'Cukup' },
            { pct: '80%', color: '#22c55e', label: 'Kuat' },
            { pct: '100%',color: '#16a34a', label: 'Sangat kuat' },
        ];
        const lvl = val.length === 0 ? null : levels[Math.min(score - 1, 4)];
        fill.style.width  = lvl ? lvl.pct   : '0%';
        fill.style.background = lvl ? lvl.color : '';
        text.textContent  = lvl ? lvl.label : '';
    }

    // Ripple on submit
    const btn = document.getElementById('btnRegister');
    btn.addEventListener('click', function(e) {
        const circle = document.createElement('span');
        const diameter = Math.max(btn.clientWidth, btn.clientHeight);
        const radius = diameter / 2;
        const rect = btn.getBoundingClientRect();
        circle.style.cssText = `width:${diameter}px;height:${diameter}px;left:${e.clientX - rect.left - radius}px;top:${e.clientY - rect.top - radius}px;`;
        circle.classList.add('ripple');
        const existing = btn.querySelector('.ripple');
        if (existing) existing.remove();
        btn.appendChild(circle);
    });

    // Auto-dismiss alerts
    document.querySelectorAll('.alert').forEach(el => {
        setTimeout(() => {
            el.style.transition = 'opacity 0.4s ease, margin 0.4s ease, padding 0.4s ease';
            el.style.opacity = '0';
            el.style.marginBottom = '0';
            el.style.padding = '0';
            setTimeout(() => el.remove(), 450);
        }, 5000);
    });
</script>

</body>
</html>
