name: dar-sai
services:
  db:
    ports:
      - "3306:3306"
    image: mysql:8.0
    container_name: satu-amal-db
    restart: unless-stopped
    environment:
      TZ: Asia/Jakarta
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: satu_amal
      MYSQL_USER: satuamal
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - satu-amal-net

  web:
    build: .
    container_name: satu-amal-web
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./uploads:/app/uploads
    env_file: .env
    environment:
      TZ: Asia/Jakarta
      DATABASE_URL: mysql+pymysql://satuamal:${MYSQL_PASSWORD}@db/satu_amal
    depends_on:
      db:
        condition: service_healthy
    networks:
      - satu-amal-net

volumes:
  mysql_data:

networks:
  satu-amal-net:
    driver: bridge
